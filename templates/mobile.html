<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Biometric Scanner</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            overflow: hidden;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        h3 {
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #3b82f6;
            letter-spacing: 1px;
        }
        p.subtitle {
            text-align: center;
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 12px;
        }
        video {
            width: 100%;
            max-width: 100vw;
            height: auto;
            max-height: 70vh;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 16px;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            text-align: center;
            background: linear-gradient(to top, rgba(15,23,42,0.95) 60%, transparent);
        }
        button {
            background: #10b981;
            border: none;
            color: white;
            padding: 16px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 30px;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 20px rgba(16,185,129,0.4);
            width: 100%;
            max-width: 320px;
            min-height: 52px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s;
        }
        button:active {
            background: #059669;
            transform: scale(0.97);
        }
        .success-screen {
            text-align: center;
            padding: 40px 20px;
        }
        .success-screen h2 {
            color: #10b981;
            font-size: 1.4rem;
            margin-bottom: 12px;
        }
        .success-screen p {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        @media (max-width: 380px) {
            button { font-size: 0.9rem; padding: 14px 24px; }
            video { border-radius: 8px; }
        }
        @media (max-height: 500px) and (orientation: landscape) {
            video { max-height: 55vh; }
            .controls { padding: 12px 16px; }
            button { padding: 12px 24px; font-size: 0.9rem; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>
    <video id="vid" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <div class="controls">
        <button id="btn-snap">Capture Face Profile</button>
    </div>

    <script>
        const socket = io();
        const sessionId = new URLSearchParams(window.location.search).get('session_id');
        socket.emit('join', { session_id: sessionId });

        const video = document.getElementById('vid');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        let streamActive = true;

        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
            .then(stream => {
                video.srcObject = stream;
                
                // Blast frames locally to socket continuously 
                setInterval(() => {
                    if(!streamActive) return;
                    canvas.width = video.videoWidth || 320;
                    canvas.height = video.videoHeight || 240;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    // Medium quality JPEG string wrapper
                    const frameData = canvas.toDataURL('image/jpeg', 0.5); 
                    socket.emit('video_frame', { session_id: sessionId, image: frameData });
                }, 100); // 10 fps
            })
            .catch(err => {
                alert("Camera locked or unavailable on phone: " + err);
            });

        document.getElementById('btn-snap').addEventListener('click', () => {
            streamActive = false;
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const highResData = canvas.toDataURL('image/jpeg', 0.9);
            
            socket.emit('remote_capture', { session_id: sessionId, image: highResData });
            document.body.innerHTML = "<div class='success-screen'><h2>✅ Identity Capture Sent!</h2><p>Look back at your laptop screen to continue.</p></div>";
            if(video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); }
        });
    </script>
</body>
</html>
